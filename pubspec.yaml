name: orventus_admin
description: A minimal Flutter admin dashboard (mock-data) for "Orventus"—starter template.
publish_to: 'none'
version: 0.1.0
environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.6
  intl: ^0.17.0
  provider: ^6.0.5
  dio: ^5.4.1
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/mock_data.json
